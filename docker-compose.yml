name: musicshop

services:

  db:
    image: postgres:16-alpine
    container_name: musicshop-db
    environment:
      POSTGRES_DB: MusicShop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - musicshop-pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d MusicShop"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: musicshop-image
    container_name: musicshop-web
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=MusicShop;Username=postgres;Password=postgres"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  musicshop-pgdata:
